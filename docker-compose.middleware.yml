# 仅部署中间件 — 用于远程服务器
# 用法: docker compose -f docker-compose.middleware.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chuma
      POSTGRES_PASSWORD: chuma
      POSTGRES_DB: chuma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8020:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
