services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  ai:
    build: ./ai
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - chromadb
    volumes:
      - ./ai:/app
      - ./ai/data:/app/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chuma
      POSTGRES_PASSWORD: chuma
      POSTGRES_DB: chuma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8020:8000"
    volumes:
      - chromadb_data:/chroma/chroma

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
